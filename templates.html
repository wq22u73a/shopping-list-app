<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>テンプレ管理</title>
  <meta name="theme-color" content="#333333" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <nav class="nav">
      <a href="index.html" class="nav-link">買い物リスト</a>
      <a href="templates.html" class="nav-link active">テンプレ管理</a>
    </nav>

    <h1>テンプレ管理</h1>

    <div class="template-add">
      <input type="text" id="templateName" placeholder="テンプレ登録（商品名）" />
      <select id="templateCategory">
        <option value="食品">食品</option>
        <option value="食品（冷凍）">食品（冷凍）</option>
        <option value="調味料">調味料</option>
        <option value="日用品">日用品</option>
        <option value="化粧品">化粧品</option>
        <option value="その他">その他</option>
      </select>
      <button id="addTemplateButton">テンプレ追加</button>
    </div>

    <div class="template-section">
      <h2>登録済みテンプレ</h2>
      <div id="templateManageList"></div>
    </div>
  </div>

  <script src="templates.js"></script>
</body>
</html>
