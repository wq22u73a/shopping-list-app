<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>買い物リスト</title>
  <meta name="theme-color" content="#7b5a4f" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="header-top">
        <button class="icon-button" type="button" aria-label="メニュー">☰</button>
        <h1>買い物リスト</h1>
        <button class="icon-button" type="button" aria-label="表示切替">□</button>
      </div>

      <nav class="tab-nav" id="tabNav">
        <button class="tab-button active" data-tab="食品" type="button">食品</button>
        <button class="tab-button" data-tab="調味料" type="button">調味料</button>
        <button class="tab-button" data-tab="日用品" type="button">日用品</button>
        <button class="tab-button" data-tab="ドラッグストア" type="button">ドラッグストア</button>
        <button class="tab-button" data-tab="その他" type="button">その他</button>
        <button class="tab-button" data-tab="テンプレ" type="button">テンプレ</button>
      </nav>
    </header>

    <main class="app-main">
      <div id="installArea" class="install-area" hidden>
        <div class="install-card">
          <div class="install-text">
            <p class="install-title">アプリとして使えます</p>
            <p class="install-description">
              ホーム画面に追加すると、アドレスバーなしで使えます。
            </p>
          </div>
          <div class="install-actions">
            <button id="installButton" class="install-button" type="button">インストール</button>
            <button id="closeInstallButton" class="install-close-button" type="button">×</button>
          </div>
        </div>
      </div>

      <section class="input-card" id="shoppingInputCard">
        <div class="input-row">
          <input type="text" id="itemName" placeholder="商品名を入力" />
          <select id="itemCategory">
            <option value="食品">食品</option>
            <option value="調味料">調味料</option>
            <option value="日用品">日用品</option>
            <option value="ドラッグストア">ドラッグストア</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <div class="input-actions">
          <button id="addButton" class="primary-button" type="button">追加</button>
          <label class="filter-label">
            <input type="checkbox" id="hidePurchased" />
            未購入のみ
          </label>
        </div>

        <div class="template-mini-section" id="currentTemplateSection">
          <h3 id="currentTemplateTitle">食品</h3>
          <div id="currentTemplateChips" class="template-chip-wrap"></div>
        </div>
      </section>

      <section class="input-card template-top-card" id="templateTopCard" hidden>
        <div class="top-card-header">
          <h2>テンプレ追加</h2>
        </div>

        <div class="template-add-row">
          <input type="text" id="templateName" placeholder="テンプレ名を入力" />
          <select id="templateCategory">
            <option value="食品">食品</option>
            <option value="調味料">調味料</option>
            <option value="日用品">日用品</option>
            <option value="ドラッグストア">ドラッグストア</option>
            <option value="その他">その他</option>
          </select>
          <button id="addTemplateButton" class="primary-button" type="button">テンプレ追加</button>
        </div>
      </section>

      <section class="section-card" id="templatePanel" hidden>
        <div class="section-header">
          <h2>よく買うもの</h2>
        </div>
        <div id="templateList"></div>
      </section>

      <section class="section-card" id="shoppingPanel">
        <div class="section-header">
          <h2 id="currentTabTitle">食品</h2>
          <button id="sortButton" class="sub-button" type="button">並び替え</button>
        </div>

        <div id="shoppingList"></div>
      </section>

      <div id="toast" class="toast" hidden>追加しました</div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
